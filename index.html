<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG TaxBot</title>
    <link rel="stylesheet" href="assets/styles.css?v=20260607-blue-white" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Thanh điều khiển">
        <div class="brand">
          <span class="brand-mark">T</span>
          <div>
            <strong>RAG TaxBot</strong>
            <span>Demo tư vấn thuế chung</span>
          </div>
        </div>

        <section class="panel conversation-panel">
          <div class="panel-title">
            <span>Cuộc trò chuyện</span>
            <small id="saveStatus">Đã lưu tự động</small>
          </div>
          <div class="conversation-actions">
            <button type="button" id="newChatBtn">Tạo mới</button>
            <button type="button" id="saveChatBtn" class="secondary">Lưu</button>
          </div>
          <div id="conversationList" class="conversation-list" aria-label="Danh sách cuộc trò chuyện"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <span>Bộ lọc</span>
            <small>retrieval</small>
          </div>
          <label class="field">
            <span>Lĩnh vực thuế</span>
            <select id="domainFilter">
              <option value="auto">Tự động nhận diện</option>
              <option value="gtgt">Thuế GTGT</option>
              <option value="tncn">Thuế TNCN</option>
              <option value="tndn">Thuế TNDN</option>
              <option value="qlt">Quản lý thuế</option>
              <option value="invoice">Hóa đơn chứng từ</option>
              <option value="penalty">Xử phạt thuế</option>
            </select>
          </label>
          <label class="field">
            <span>Thời điểm hiệu lực</span>
            <input id="effectiveDate" type="date" />
          </label>
          <label class="check-row">
            <input id="strictCitation" type="checkbox" checked />
            <span>Bắt buộc căn cứ pháp lý</span>
          </label>
          <label class="check-row">
            <input id="guardrailMode" type="checkbox" checked />
            <span>Bật kiểm soát rủi ro</span>
          </label>
        </section>

        <section class="panel audit-panel">
          <div class="panel-title">
            <span>Audit log</span>
            <small>runtime</small>
          </div>
          <pre id="auditLog" class="audit-log">{
  "status": "waiting_for_question"
}</pre>
        </section>
      </aside>

      <main class="chat-panel" aria-label="Giao diện chat">
        <header class="topbar">
          <div>
            <p class="eyebrow">Local demo</p>
            <h1>Chatbot RAG tư vấn thuế</h1>
          </div>
          <div class="topbar-meta">
            <span id="currentChatTitle">Cuộc trò chuyện mới</span>
          </div>
        </header>

        <section class="messages" id="messages" aria-live="polite"></section>

        <form class="composer" id="chatForm">
          <label for="questionInput" class="sr-only">Nhập câu hỏi</label>
          <textarea
            id="questionInput"
            rows="2"
            placeholder="Nhập câu hỏi về thuế..."
            required
          ></textarea>
          <button type="submit" id="submitBtn">Gửi</button>
        </form>
      </main>
    </div>

    <script src="assets/app.js?v=20260607-blue-white"></script>
  </body>
</html>
